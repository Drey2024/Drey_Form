<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale">
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
     <body>
        f
     <div class="min-h-screen flex items-center justify-center p-4 sm:p-8 ">
  
  <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
    
    <div class="flex flex-col md:flex-row">
      
      <div class="bg-blue-600 md:w-1/3 p-10 flex flex-col text-center justify-center text-white">
        <h2 class="text-2xl font-bold">Drey Money</h2>
        <p class="text-white mt-2 text-sm leading-relaxed">We're excited to have you 
            join the family! Register your details below to stay 
            connected with our upcoming events and service opportunities.</p>
      </div>

      <form class="p-8 md:w-2/3 space-y-5">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">First Name</label>
            <input type="text" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Last Name</label>
            <input type="text" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-blue-500 outline-none">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Email Address</label>
          <input type="email" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-blue-500 outline-none">
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Service Department</label>
          <select class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-blue-500 outline-none appearance-none">
            <option>Media & Tech</option>
            <option>Choir</option>
            <option>Ushering</option>
            
          </select>
        </div>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all transform active:scale-95">
          Submit Registration
        </button>
      </form>
      
    </div>
  </div>
</div>
   

    </body>
</html>
